version: '3.8'

services:
  # 1. FRONTEND (REACT)
  frontend:
    image: node:20-alpine
    container_name: react_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    environment:
      - CHOKIDAR_USEPOLLING=true

  # 2. BACKEND (ASP.NET CORE)
  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: aspnet_backend
    working_dir: /app
    command: dotnet watch run --urls "http://0.0.0.0:8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    environment:
      - ConnectionStrings__DefaultConnection=Server=database;Database=do_an_db;User=root;Password=SecretPassword123!;

  # 3. DATABASE (MYSQL)
  database:
    image: mysql:8.0
    container_name: mysql_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: SecretPassword123!
      MYSQL_DATABASE: do_an_db
    volumes:
      - mysql_data:/var/lib/mysql 

  # 4. PHPMYADMIN (QUẢN LÝ DATABASE TRÊN TRÌNH DUYỆT - GIỐNG XAMPP)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_web
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: root
      PMA_PASSWORD: SecretPassword123!
    depends_on:
      - database

volumes:
  mysql_data: